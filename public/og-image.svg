<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with subtle gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#F5F1EA"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Decorative pizza slice illustration (simple) -->
  <circle cx="120" cy="90" r="70" fill="#C84A47" opacity="0.08"/>
  <circle cx="1080" cy="540" r="90" fill="#C84A47" opacity="0.08"/>
  
  <!-- Top decorative line -->
  <line x1="480" y1="100" x2="720" y2="100" stroke="#C84A47" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Main restaurant name -->
  <text x="600" y="230" 
        font-family="'Playfair Display', 'Georgia', serif" 
        font-size="100" 
        font-weight="700" 
        fill="#1A1A1A" 
        text-anchor="middle"
        letter-spacing="2">Altro Da Tony</text>
  
  <!-- Subtitle with elegant styling -->
  <text x="600" y="310" 
        font-family="'Cormorant Garamond', 'Georgia', serif" 
        font-size="40" 
        fill="#C84A47" 
        text-anchor="middle"
        font-style="italic">Autentica Cucina Italiana</text>
  
  <!-- Decorative divider with dots -->
  <circle cx="550" cy="355" r="5" fill="#C84A47" opacity="0.6"/>
  <circle cx="600" cy="355" r="5" fill="#C84A47"/>
  <circle cx="650" cy="355" r="5" fill="#C84A47" opacity="0.6"/>
  
  <!-- Three feature boxes -->
  <g>
    <!-- Pizza feature -->
    <rect x="150" y="400" width="250" height="100" rx="8" fill="white" opacity="0.6"/>
    <text x="275" y="445" 
          font-family="'Cormorant Garamond', 'Georgia', serif" 
          font-size="26" 
          font-weight="600"
          fill="#1A1A1A" 
          text-anchor="middle">Pizza Napoletana</text>
    <text x="275" y="475" 
          font-family="'Cormorant Garamond', 'Georgia', serif" 
          font-size="18" 
          fill="#666" 
          text-anchor="middle">Pec Morello Forni</text>
    
    <!-- Pasta feature -->
    <rect x="475" y="400" width="250" height="100" rx="8" fill="white" opacity="0.6"/>
    <text x="600" y="445" 
          font-family="'Cormorant Garamond', 'Georgia', serif" 
          font-size="26" 
          font-weight="600"
          fill="#1A1A1A" 
          text-anchor="middle">Pasta Fresca</text>
    <text x="600" y="475" 
          font-family="'Cormorant Garamond', 'Georgia', serif" 
          font-size="18" 
          fill="#666" 
          text-anchor="middle">Denně čerstvá</text>
    
    <!-- Wine feature -->
    <rect x="800" y="400" width="250" height="100" rx="8" fill="white" opacity="0.6"/>
    <text x="925" y="445" 
          font-family="'Cormorant Garamond', 'Georgia', serif" 
          font-size="26" 
          font-weight="600"
          fill="#1A1A1A" 
          text-anchor="middle">Vini Italiani</text>
    <text x="925" y="475" 
          font-family="'Cormorant Garamond', 'Georgia', serif" 
          font-size="18" 
          fill="#666" 
          text-anchor="middle">Autentické chutě</text>
  </g>
  
  <!-- Location at bottom -->
  <text x="600" y="560" 
        font-family="'Cormorant Garamond', 'Georgia', serif" 
        font-size="28" 
        fill="#1A1A1A" 
        text-anchor="middle">📍 Praha 2, Korunní 48</text>
</svg>