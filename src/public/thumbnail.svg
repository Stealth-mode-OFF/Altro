<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#FAF8F5"/>
  
  <!-- Decorative elements -->
  <circle cx="150" cy="100" r="80" fill="#C84A47" opacity="0.1"/>
  <circle cx="1050" cy="530" r="100" fill="#C84A47" opacity="0.1"/>
  
  <!-- Top accent line -->
  <rect x="500" y="80" width="200" height="3" fill="#C84A47"/>
  
  <!-- Main text -->
  <text x="600" y="200" font-family="'Playfair Display', serif" font-size="90" font-weight="700" fill="#1A1A1A" text-anchor="middle">Altro Da Tony</text>
  
  <!-- Subtitle -->
  <text x="600" y="280" font-family="'Cormorant Garamond', serif" font-size="36" fill="#C84A47" text-anchor="middle">Autentica Cucina Italiana</text>
  
  <!-- Decorative divider -->
  <rect x="450" y="320" width="100" height="2" fill="#C84A47" opacity="0.5"/>
  <circle cx="600" cy="321" r="4" fill="#C84A47"/>
  <rect x="650" cy="320" width="100" height="2" fill="#C84A47" opacity="0.5"/>
  
  <!-- Features -->
  <text x="300" y="420" font-family="'Cormorant Garamond', serif" font-size="24" fill="#4A4A4A" text-anchor="middle">Pizza Napoletana</text>
  <text x="600" y="420" font-family="'Cormorant Garamond', serif" font-size="24" fill="#4A4A4A" text-anchor="middle">Pasta Fresca</text>
  <text x="900" y="420" font-family="'Cormorant Garamond', serif" font-size="24" fill="#4A4A4A" text-anchor="middle">Vini Italiani</text>
  
  <!-- Location -->
  <text x="600" y="500" font-family="'Cormorant Garamond', serif" font-size="28" fill="#1A1A1A" text-anchor="middle">Praha 2, Korunní 48</text>
  
  <!-- Bottom accent -->
  <rect x="500" y="540" width="200" height="3" fill="#C84A47"/>
